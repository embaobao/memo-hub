# 记忆系统 CLI 配置文件
# 复制此文件为 config.yaml 并修改为你的配置

# 嵌入模型配置
embedding:
  # 模型服务 URL
  url: "http://localhost:11434/v1"
  # 模型名称
  model: "nomic-embed-text-v2-moe"
  # 向量维度
  dimensions: 768
  # 超时时间（秒）
  timeout: 30

# GBrain 配置（通用知识记忆）
gbrain:
  # 数据库路径
  db_path: "~/.hermes/data/gbrain.lancedb"
  # 表名
  table_name: "gbrain"
  # 默认分类
  default_category: "other"
  # 默认重要性 (0.0 - 1.0)
  default_importance: 0.5

# ClawMem 配置（代码记忆）
clawmem:
  # 数据库路径
  db_path: "~/.hermes/data/clawmem.lancedb"
  # 表名
  table_name: "clawmem"
  # 默认语言
  default_language: "typescript"
  # 默认重要性 (0.0 - 1.0)
  default_importance: 0.5

# 统一搜索配置
search:
  # 默认搜索源
  default_sources: ["gbrain", "clawmem"]
  # 默认结果数量
  default_limit: 5
  # 并行搜索
  parallel: true
  # 缓存启用
  cache_enabled: true
  # 缓存路径
  cache_path: "~/.hermes/cache/memory-search"

# 同步配置
sync:
  # 编辑器记忆路径
  editor_memory_paths:
    - "~/.claude-code/memory"
    - "~/.opencode/memory"
    - "~/.trae/memory"
  # 同步间隔（秒）
  interval: 3600
  # 云同步配置
  cloud:
    enabled: false
    provider: "github" # github | gitlab | s3
    repo: "your-username/memory-backup"
    branch: "main"

# 日志配置
logging:
  # 日志级别: debug | info | warn | error
  level: "info"
  # 日志文件路径
  file: "~/.hermes/logs/memory-cli.log"
  # 控制台输出
  console: true

# MCP 服务器配置（可选）
mcp_server:
  # 启用 MCP 服务器
  enabled: true
  # 服务器端口（如果使用 SSE）
  port: 3000
  # 传输协议: stdio | sse
  transport: "stdio"
  # 超时时间（秒）
  timeout: 30
