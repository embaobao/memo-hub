# 记忆系统 CLI 配置文件
# 复制此文件为 config.yaml 并修改为你的配置

# 嵌入模型配置
embedding:
  # 模型服务 URL
  url: "http://localhost:11434/v1"
  # 模型名称
  model: "nomic-embed-text-v2-moe"
  # 向量维度
  dimensions: 768
  # 超时时间（秒）
  timeout: 30

# CAS（内容寻址存储，可选）
cas:
  # 原文落盘根目录（支持 ~ 展开）
  root_path: "~/.hermes/data/memohub-cas"

# 写入路由配置（可选）
# 说明：
# - 用于“写入管”的智能路由阶段：根据 MemoContext.filePath 等信息决定写入到哪个轨道
# - 默认规则：filePath 后缀命中 → clawmem；否则 → gbrain
routing:
  # 是否启用路由阶段
  enabled: true
  # 默认轨道（兜底）
  default_track: "gbrain"
  # 默认“代码后缀”列表（未配置 rules 时生效）
  code_suffixes:
    - ".ts"
    - ".tsx"
    - ".js"
    - ".jsx"
    - ".mjs"
    - ".cjs"
    - ".json"
    - ".md"
    - ".py"
    - ".go"
    - ".rs"
    - ".java"
    - ".kt"
    - ".swift"
    - ".c"
    - ".cc"
    - ".cpp"
    - ".h"
    - ".hpp"
    - ".cs"
    - ".php"
    - ".rb"
    - ".lua"
    - ".sql"
    - ".sh"
    - ".zsh"
    - ".yml"
    - ".yaml"
    - ".toml"
  # 可选：自定义规则（责任链，按顺序执行）
  # 注意：一旦显式配置 rules，系统将认为是“全量覆盖”（将忽略 code_suffixes）
  # rules:
  #   - type: "file_suffix"
  #     name: "route_code_by_suffix"
  #     track: "clawmem"
  #     suffixes: [".ts", ".tsx", ".js", ".jsx", ".py"]
  #   - type: "default"
  #     name: "route_default"
  #     track: "gbrain"

# GBrain 配置（通用知识记忆）
gbrain:
  # 数据库路径
  db_path: "~/.hermes/data/gbrain.lancedb"
  # 表名
  table_name: "gbrain"
  # 默认分类
  default_category: "other"
  # 默认重要性 (0.0 - 1.0)
  default_importance: 0.5

# ClawMem 配置（代码记忆）
clawmem:
  # 数据库路径
  db_path: "~/.hermes/data/clawmem.lancedb"
  # 表名
  table_name: "clawmem"
  # 默认语言
  default_language: "typescript"
  # 默认重要性 (0.0 - 1.0)
  default_importance: 0.5

# 统一搜索配置
search:
  # 默认搜索源
  default_sources: ["gbrain", "clawmem"]
  # 默认结果数量
  default_limit: 5
  # 并行搜索
  parallel: true
  # 缓存启用
  cache_enabled: true
  # 缓存路径
  cache_path: "~/.hermes/cache/memory-search"

# 同步配置
sync:
  # 编辑器记忆路径
  editor_memory_paths:
    - "~/.claude-code/memory"
    - "~/.opencode/memory"
    - "~/.trae/memory"
  # 同步间隔（秒）
  interval: 3600
  # 云同步配置
  cloud:
    enabled: false
    provider: "github" # github | gitlab | s3
    repo: "your-username/memory-backup"
    branch: "main"

# 日志配置
logging:
  # 日志级别: debug | info | warn | error
  level: "info"
  # 日志文件路径
  file: "~/.hermes/logs/memory-cli.log"
  # 控制台输出
  console: true

# MCP 服务器配置（可选）
mcp_server:
  # 启用 MCP 服务器
  enabled: true
  # 服务器端口（如果使用 SSE）
  port: 3000
  # 传输协议: stdio | sse
  transport: "stdio"
  # 超时时间（秒）
  timeout: 30
