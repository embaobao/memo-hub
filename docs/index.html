<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MemoHub - Unified Memory for AI. Build your own private AI memory asset center." />
    <title>MemoHub</title>
    <link rel="icon" href="assets/memohub-logo.svg" />
    <style>
      :root {
        --theme-color: #3656ff;
        --sidebar-name-color: #092060;
        --mono-hue: 224;
      }
      body {
        background: radial-gradient(circle at 20% 0%, rgba(47, 123, 255, 0.08), transparent 36%),
          radial-gradient(circle at 80% 12%, rgba(125, 77, 255, 0.1), transparent 32%), #ffffff;
      }
      .app-name-link img {
        max-width: 168px;
      }
      .markdown-section {
        max-width: 980px;
      }
      .markdown-section h1,
      .markdown-section h2 {
        letter-spacing: -0.03em;
      }
    </style>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  </head>
  <body>
    <div id="app">Loading MemoHub docs...</div>
    <script>
      window.$docsify = {
        name: '<img src="assets/memohub-logo.svg" alt="MemoHub" />',
        repo: 'https://github.com/embaobao/memo-hub',
        homepage: 'README.md',
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        relativePath: true,
        themeColor: '#3656ff',
        search: {
          placeholder: '搜索文档 / Search docs',
          noData: '没有结果 / No results',
          depth: 3
        }
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
