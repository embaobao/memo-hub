# MemoHub Hermes MCP 配置示例
#
# 前置条件：
#   bun run build:cli
#   bun run verify:cli
#   bun run link:cli
#   memohub config check
#   memohub mcp doctor

mcpServers:
  memohub:
    command: memohub
    args:
      - serve
    timeout: 60

# Agent 接入后应先读取 memohub://tools，再选择工具。
#
# 当前推荐工具：
#   - memohub_ingest_event
#   - memohub_query
#   - memohub_summarize
#   - memohub_clarification_create
#   - memohub_clarification_resolve
#   - memohub_config_get
#   - memohub_config_set
#   - memohub_config_manage
#   - memohub_data_manage
#
# 当前资源：
#   - memohub://tools
#   - memohub://stats
