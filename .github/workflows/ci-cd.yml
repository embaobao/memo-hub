# MemoHub CI/CD 工作流
# 职责: 自动构建、测试和发布 npm 包

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  # 测试任务
  test:
    name: 测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install

      - name: 构建项目
        run: bun run build

      - name: 运行测试
        run: bun run test

  # 发布任务（仅在 release 时触发）
  publish:
    name: 发布到 npm
    runs-on: ubuntu-latest

    needs: test

    if: github.event_name == 'release' && github.event.action == 'created'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install

      - name: 构建项目
        run: bun run build

      - name: 验证构建
        run: |
          echo "验证构建产物..."
          ls -la apps/cli/dist/
          echo "✅ 构建验证完成"

      - name: 配置 npm
        run: |
          echo "配置 npm 发布..."
          npm config set provenance true

      - name: 发布到 npm
        run: |
          echo "发布到 npm..."
          cd apps/cli
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 发布成功
        run: echo "✅ 发布成功！"
