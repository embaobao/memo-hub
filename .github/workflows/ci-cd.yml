# MemoHub CI/CD 工作流
# 职责: 自动构建、测试和发布 npm 包

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  # 构建和测试任务
  build-and-test:
    name: 构建与测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 获取 Bun 缓存目录
        id: bun-cache
        run: echo "STORE_PATH=$(bun pm cache)" >> $GITHUB_OUTPUT

      - name: 设置 Bun 依赖缓存
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 构建项目
        run: bun run build

      - name: 运行测试
        run: bun run test

      - name: 上传构建产物
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: |
            apps/cli/dist/
            apps/cli/package.json
            package.json
          retention-days: 1

  # 发布任务（仅在 release 时触发）
  publish:
    name: 发布到 npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'release' && github.event.action == 'created'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: 验证构建
        run: |
          ls -la apps/cli/dist/
          echo "✅ 产物验证完成"

      - name: 配置 npm
        run: npm config set provenance true

      - name: 发布到 npm
        run: |
          cd apps/cli
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
