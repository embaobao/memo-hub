<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoHub Console Test</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-left: 3px solid #3b82f6;
        }
        .success { border-color: #10b981; }
        .error { border-color: #ef4444; }
        .info { border-color: #3b82f6; }
    </style>
</head>
<body>
    <h1>🧪 MemoHub Web Console 诊断</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        async function runTests() {
            addResult('开始诊断...', 'info');

            // 测试 1: API 连接
            try {
                const apiRes = await fetch('/api/inspect');
                if (apiRes.ok) {
                    const data = await apiRes.json();
                    addResult(`✅ API 正常: 找到 ${data.tracks?.length || 0} 个 tracks`, 'success');
                } else {
                    addResult(`❌ API 错误: ${apiRes.status}`, 'error');
                }
            } catch (e) {
                addResult(`❌ API 连接失败: ${e.message}`, 'error');
            }

            // 测试 2: 静态资源
            try {
                const jsRes = await fetch('/assets/index-BgFtGbJT.js');
                if (jsRes.ok) {
                    addResult(`✅ JS 文件正常: ${Math.round(jsRes.headers.get('content-length') / 1024)}KB`, 'success');
                } else {
                    addResult(`❌ JS 文件错误: ${jsRes.status}`, 'error');
                }
            } catch (e) {
                addResult(`❌ JS 文件加载失败: ${e.message}`, 'error');
            }

            // 测试 3: React 根元素
            const rootElement = document.getElementById('root');
            if (rootElement) {
                addResult('✅ React 挂载点存在', 'success');
                if (rootElement.children.length > 0) {
                    addResult(`✅ React 已渲染: ${rootElement.children.length} 个子元素`, 'success');
                } else {
                    addResult('⚠️ React 未渲染 (可能还在加载)', 'error');
                }
            } else {
                addResult('❌ React 挂载点不存在', 'error');
            }

            // 测试 4: 检查全局变量
            if (typeof React !== 'undefined') {
                addResult('✅ React 已加载', 'success');
            } else {
                addResult('⚠️ React 未检测到 (模块化构建)', 'info');
            }

            addResult('诊断完成。如果所有测试通过，请按 F12 查看浏览器控制台是否有错误。', 'info');
        }

        // 延迟执行以确保 React 有时间加载
        setTimeout(runTests, 2000);
    </script>

    <!-- React 挂载点 -->
    <div id="root"></div>

    <hr>
    <h2>🔧 手动测试步骤</h2>
    <ol>
        <li>打开浏览器控制台 (F12)</li>
        <li>查看 Console 标签页是否有错误</li>
        <li>查看 Network 标签页确认所有资源已加载</li>
        <li>强制刷新页面 (Ctrl+Shift+R)</li>
        <li>如果问题持续，尝试清除浏览器缓存</li>
    </ol>

    <h2>📞 当前状态</h2>
    <ul>
        <li>构建时间: 2026-04-27 11:34</li>
        <li>JS 文件: index-BgFtGbJT.js (220KB)</li>
        <li>API 端点: http://localhost:3000/api/inspect</li>
        <li>服务状态: 运行中</li>
    </ul>
</body>
</html>
